<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Smart Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-box">
        <h2 style="text-align:center; margin-bottom:20px;">WUB Registration</h2>
        <form id="loginForm">
            <div style="margin-bottom:15px;">
                <label>Student ID</label>
                <input type="text" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;" required>
            </div>
            <div style="margin-bottom:15px;">
                <label>Password</label>
                <input type="password" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
